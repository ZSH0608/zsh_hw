<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张书晗 D3 可视化练习 </title>
    <link rel="stylesheet" href="style.css">
    
    <!-- 引入 D3.js CDN -->

<body>

            <!-- App 1 Chart: WeChat -->

            </div>

    </div>
    <!-- ============================================ -->
    <!-- 系列2: 欧盟领土演变瀑布图 -->
    <!-- ============================================ -->
    <div class="chart-container">
        <h2>欧盟领土演变图 - 系列2</h2>
        <div id="eu-chart" class="eu-chart-container">
        </div>
    </div>
    
    <script src="src/data_processor.js"></script>
    <script src="src/app_chart.js"></script>
    <script src="src/European_Union.js"></script>
